    <!-- Text lines on left page -->
    <line x1="8" y1="12" x2="30" y2="12" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="8" y1="18" x2="28" y2="18" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="8" y1="24" x2="30" y2="24" stroke="#FFD700" stroke-width="1.5"/>
    
    <!-- Text lines on right page -->
    <line x1="50" y1="12" x2="72" y2="12" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="50" y1="18" x2="70" y2="18" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="50" y1="24" x2="72" y2="24" stroke="#FFD700" stroke-width="1.5"/>
